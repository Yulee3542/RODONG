# RODONG ROS1 simulation container.
#   build:  scripts/sim_build.sh   (or docker compose -f docker/compose.yaml build)
#   run:    scripts/sim_run.sh
# Mounts the repo at /workspace -> host code edits are reflected in the container immediately.
services:
  sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: rodong-sim:noetic
    container_name: rodong-sim
    # host networking -> roscore(11311) is directly accessible from another terminal (docker exec).
    network_mode: host
    ipc: host
    environment:
      # Headless default: software GL. With GPU passthrough, set SOFTWARE_GL=0 to disable.
      - LIBGL_ALWAYS_SOFTWARE=${SOFTWARE_GL:-1}
      - DISPLAY=${DISPLAY:-:0}
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_HOSTNAME=localhost
    # Intel iGPU passthrough (accelerates GUI/rendering if present, harmless if absent).
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ..:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    stdin_open: true
    tty: true
    working_dir: /workspace
    command: bash
